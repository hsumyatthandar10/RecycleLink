{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Supplier</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">


    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body class="dark-mode">

    <div class="container text-center mt-4">
        <h2 class="title">🚗 Find Nearest Supplier</h2>

        <!-- Step Indicators -->
        <div class="steps">
            <span id="step1" class="step active">1️⃣ Select Location</span>
            <span id="step2" class="step">2️⃣ Confirm Location</span>
            <span id="step3" class="step">3️⃣ Find Supplier</span>
        </div>

        <!-- Action Button (Use Location / Confirm) -->
        <!-- <button id="action-btn" class="btn btn-primary my-3" onclick="handleAction()">📍 Use My Location</button> -->
        <div id="button-container">
            <button id="action-btn" class="btn btn-primary my-3" onclick="handleAction()">📍 Use My Location</button>
           
        </div>
        
        <!-- Map -->
        <div id="map"></div>
    </div>

    
    <!-- Modal for displaying supplier information -->
<div id="supplierModal" class="modal">
    <div class="modal-content">
      <span class="close-btn" onclick="closeModal()">×</span>
      <h2>Supplier Details</h2>
      <p id="supplier-name">Supplier: </p>
      <p id="supplier-distance">Distance: </p>
      <p id="supplier-eta">Estimated Arrival Time: </p>
      <button id="action-btn" onclick="handleAction()">Cancel Request</button>
    </div>
  </div>
  
    <!-- <button id="cancel-btn" style="display: none;" onclick="cancelRequest()">❌ Cancel Request</button> -->
   

    

    <!-- JS -->
    <script src="{% static 'js/location.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
