{% extends 'footer.html' %}

{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Order Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eafaf1;
            margin: 0;
            padding: 0;
            margin-top: 100px;
        }
        .container {
            width: 90%;
            margin: 20px auto;
            text-align: center;
        }
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-section input, .filter-section button {
            padding: 10px;
            border: 1px solid #008115;
            border-radius: 5px;
        }
        .filter-section button {
            background-color: #008115;
            color: white;
            cursor: pointer;
        }
        .orders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        .order-card {
            width: 330px;
            background: white;
            border-radius: 10px;
            box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: left;
            position: relative;
            transition: transform 0.2s;
           
        }
        .order-card:hover {
            transform: scale(1.05);
        }
        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .user-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #008115;
            cursor: pointer;
        }
        .order-card p {
            margin: 5px 0;
            font-size: 1rem;
        }
        .order-card .btn {
            display: block;
            text-align: center;
            background: #008115;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
        }
        .no-results {
            color: #666;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="filter-section">
            <input type="text" id="orderIdInput" placeholder="Order No">
            <input type="date" id="orderDateInput">
            <button onclick="filterOrders()">Submit</button>
        </div>
        <div id="ordersContainer" class="orders">
            {% for order in page_obj %}
            <div class="order-card">
                <div class="order-header">
                    <a href="{% url 'profile' %}" class="profile-link" title="View Profile">
                        <img src="{{ order.user_image.url }}" alt="User Image" class="user-image">
                    </a>
                </div>
                <p><strong>Order ID:</strong> {{ order.id }}</p>
                <p><strong>Order Date:</strong> {{ order.created_at|date:"Y-m-d H:i" }}</p>
                <a href="{% url 'order_success' order.id %}" class="btn">View Details</a>

            </div>
            {% empty %}
            <p class="no-results">You haven't placed any orders yet.</p>
            {% endfor %}
        </div>
    </div>
    
    <script>
        const orders = [
            {% for order in page_obj %}
            {
                id: "{{ order.id }}",
                date: "{{ order.created_at|date:'Y-m-d H:i' }}",
                userImage: "{{ order.user_image.url }}",
                profileUrl: "{% url 'profile' %}",
                orderSuccessUrl: "{% url 'order_success' order.id %}"

            },
            {% endfor %}
        ];
        function renderOrders(filteredOrders) {
            const ordersContainer = document.getElementById('ordersContainer');
            ordersContainer.innerHTML = '';
            
            if (filteredOrders.length === 0) {
                ordersContainer.innerHTML = '<p class="no-results">No matching orders found.</p>';
                return;
            }

            filteredOrders.forEach(order => {
                const orderCard = document.createElement('div');
                orderCard.className = 'order-card';
                orderCard.innerHTML = `
                    <div class="order-header">
                        <a href="${order.profileUrl}" class="profile-link" title="View Profile">
                            {% comment %} <img src="${order.userImage}" alt="User Image" class="user-image"> {% endcomment %}
                            <img id="profilePhoto" src="{% static 'img/profile.jpg' %}" alt="Profile Picture" class="user-image">
                        </a>
                        
                    </div>
                    <p><strong>Order ID:</strong> ${order.id}</p>
                    <p><strong>Order Date:</strong> ${order.date}</p>
                    <a href="${order.orderSuccessUrl}" class="btn">View Details</a>
                `;
                ordersContainer.appendChild(orderCard);
            });
        }

        function filterOrders() {
            const orderIdInput = document.getElementById('orderIdInput').value.trim().toUpperCase();
            const orderDateInput = document.getElementById('orderDateInput').value;
            
            const filteredOrders = orders.filter(order => {
                const matchesId = orderIdInput ? order.id.includes(orderIdInput) : true;
                const matchesDate = orderDateInput ? order.date.startsWith(orderDateInput) : true;
                return matchesId && matchesDate;
            });

            renderOrders(filteredOrders);
        }
        
        renderOrders(orders);
    </script>
</body>
</html>
{% endblock %}
