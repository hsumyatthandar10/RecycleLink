{% extends 'footer.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        /* Root Variables for Colors */
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #ffffff;
            --background-color: #f5f5f5;
            --text-color: #333;
            --card-shadow: rgba(0, 0, 0, 0.1);
            --button-hover-color: #45a049;
        }

        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color:black;
            color: var(--text-color);
        }

        .home-logo {
    font-size: 24px;
   
    
    padding: 10px;
    border: none;
    position: absolute; 
    top: 90px; 
    left: 0; 
    
}

.home-logo img {
    width: 50px; /* Adjust logo size */
    height: 60px;
}


        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-header h1 {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
           
           
        }

        .profile-details p {
            margin: 0;
            font-size: 1rem;
        }

        .profile-details strong {   
            color: var(--primary-color);
        }

        .profile-details .email-text, .profile-details .time-text {
            color: black; 
            font-weight: bold; 
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px;
        }

        .button-group a {
            text-decoration: none;
            padding: 10px 20px;
            font-size: 1rem;
            color:black;
            background-color: rgb(182, 191, 85);
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .button-group a:hover {
            background-color: brown;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                margin: 20px;
                padding: 15px;
            }

            .profile-header h1 {
                font-size: 1.8rem;
            }

            .profile-details p {
                font-size: 0.9rem;
                text-align: center;
            }

            .button-group a {
                font-size: 0.9rem;
                padding: 8px 15px;
            }
        }
        .profile-card {
            width: 60%;
            
            background:white;
            color: white;
            border-radius: 20px;
            text-align: center;
             margin: 90px  260px 0 300px;
            padding: 70px;
            box-shadow: 20px 40px 80px rgba(0, 0, 0, 0.2);
            position: relative;

        }

        .profile-card img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid black;
            margin-top: 10px;
        }

        .profile-card h4 {
            font-size: 20px;
           text-align: left;
            margin-bottom: 20px;
            color: #080c86;
        }

        .profile-card p {
            font-size: 20px;
           text-align: center;
            margin: 10px;
            color: #889925;
        }

        .posts-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        margin-top: 50px;
    }

    .post {
        background: #f8f8f8;
        color: black;
        width: 80%;
        max-width: 400px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.3);
        position: relative;
        border: 10px solid #d4bec0;
        
    }
    .post img {
        width: 50%;
        border-radius: 20px;
        
        
        
    }
    
    .delete-post {
        position: absolute;
        top: 1px;
        right: 10px;
      
        color: rgb(235, 224, 220);
       background:#89313c ;
        cursor: pointer;
        font-size: 20px;
        padding: 5px 10px;
      border: none;
    }
  
        .navigation {
            margin-top: 10px;
        }
        .navigation a {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: #b17910;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
.edit-profile-photo {
        position: absolute;
        top: 50px;
        right: 50%;
        transform: translateX(50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border-radius: 50%;
        padding: 5px;
        cursor: pointer;
    }

    .edit-profile-photo input {
        display: none;
    }

    </style>
</head>
<body>
    <a href="{% url 'Allpost_view' %}" class="home-logo">
        <img src="{% static 'img/H1-Photoroom.png' %}" alt="Home Logo"> 
    </a>
    <div class="profile-card">
        
        <label class="edit-profile-photo">
            &#9998;
            <input type="file" id="profilePhotoInput" accept="image/*" onchange="changeProfilePhoto(event)">
        </label>
        <img id="profilePhoto" src="{% static 'img/profile.jpg' %}" alt="Profile Picture">
        <div class="profile-header">
            <h1>Welcome, {{ user.username }}</h1>
        </div>
        <div class="profile-details">
            <p><strong>Email:</strong> <span class="email-text">{{ user.email }}</span></p>
            <p><strong>Member since:</strong> <span class="time-text">{{ user.date_joined|date:"F j, Y" }}</span></p>
        </div>
        
       
        <div class="button-group">
            <a href="{% url 'logout' %}">Logout</a>
            <a href="{% url 'order_history' %}">Order History</a>
        </div>
        <div class="navigation">
            <a href="{% url 'Post_view' %}">Create a Post</a>
        </div>
        <section class="more">
           
           
           
           <div class="posts-container" id="postsContainer"></div>
           <div class="posts-container" id="profilePostsContainer"></div>

        </section>
           
           
            <br>
            
        </div>
    </div>
    
    <script>
    
        const userKey = "{{ user.username }}"; // Assuming this is populated by Django during page rendering
        const profilePhotoKey = "profilePhoto_" + userKey;
        const postsKey = "posts_" + userKey;
        
        function changeProfilePhoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newPhoto = e.target.result;
                    document.getElementById("profilePhoto").src = newPhoto;
                    localStorage.setItem("profilePhoto_" + userKey, newPhoto);
                    updatePostProfilePhotos(newPhoto);
                }
                reader.readAsDataURL(file);
            }
        }
        
        function updatePostProfilePhotos(photoSrc) {
            localStorage.setItem("postProfilePhoto_" + userKey, photoSrc);
            
            // Update profile photos in posts
            const postProfileImages = document.querySelectorAll(".profile-section img");
            postProfileImages.forEach(img => img.src = photoSrc);

        }
        // Example function when user updates profile name


        
        window.onload = function() {
            const savedPhoto = localStorage.getItem("profilePhoto_" + userKey);
        
            if (savedPhoto) {
                document.getElementById("profilePhoto").src = savedPhoto;
            }
            
            // Apply saved profile photo to posts
            const postPhoto = localStorage.getItem("postProfilePhoto_" + userKey);
            if (postPhoto) {
                const postImages = document.querySelectorAll(".profile-section img");
                postImages.forEach(img => img.src = postPhoto);
            }
        
            loadPosts();
        };
        
        function loadPosts() {
            const postsContainer = document.getElementById("postsContainer");
            postsContainer.innerHTML = "";
            let posts = JSON.parse(localStorage.getItem("posts_" + userKey)) || [];
        
            posts.sort((a, b) => b.timestamp - a.timestamp); // Sort by latest
        
            posts.forEach((post, index) => {
                const postElement = document.createElement("div");
                postElement.className = "post";
                postElement.innerHTML = `
                    <button class="delete-post" onclick="deletePost(${index})">&times;</button>
                    <h4>${post.anonymous ? "Anonymous" : userKey}</h4>  <!-- Dynamically display the username -->
                    <p>${post.text}</p>
                    ${post.images ? post.images.map(img => `<img src="${img}" alt="Post Image">`).join("") : ""}
                `;
                postsContainer.appendChild(postElement);
            });
        }
        
        function deletePost(index) {
            let posts = JSON.parse(localStorage.getItem("posts_" + userKey)) || [];
        
            if (index >= 0 && index < posts.length) {
                // Ask the user for confirmation
                const confirmation = confirm("Are you sure you want to delete this post? This action cannot be undone.");
        
                if (confirmation) {
                    // Store the deleted post data
                    const deletedPost = posts[index];
        
                    // Remove the post from the user's profile posts
                    posts.splice(index, 1);
                    localStorage.setItem("posts_" + userKey, JSON.stringify(posts));
        
                    // Remove the post from global allPosts
                    let allPosts = JSON.parse(localStorage.getItem("allPosts")) || [];
                    allPosts = allPosts.filter(post => 
                        post.text !== deletedPost.text || 
                        JSON.stringify(post.images) !== JSON.stringify(deletedPost.images) ||
                        post.username !== userKey
                    ); 
        
                    localStorage.setItem("allPosts", JSON.stringify(allPosts));
        
                    // Reload posts
                    loadPosts();
                }
            }
        }
        
        function renderProfilePosts() {
            fetch("/get_user_posts/")
                .then(response => response.json())
                .then(posts => {
                    const profileContainer = document.getElementById("profilePostsContainer");
                    profileContainer.innerHTML = ""; // Clear old posts
        
                    posts.forEach(post => {
                        const postElement = document.createElement("div");
                        postElement.classList.add("post-container");
        
                        postElement.innerHTML = `
                            <div class="post-header">
                                <h4>${post.shared_by__username ? "Shared by " + post.shared_by__username : post.user__username}</h4>
                            </div>
                            <div class="post-content">
                                <p>${post.text}</p>
                                ${post.image ? `<img src="${post.image}" alt="Post Image">` : ""}
                            </div>
                        `;
        
                        profileContainer.appendChild(postElement);
                    });
                });
        }
        




 </script>
</body>
</html>
{% endblock %}
