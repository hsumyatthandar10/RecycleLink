{% extends 'footer.html' %}

{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #E8F5E9;
        }

        header {
            background-color: #d3c18a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        header .logo {
            font-size: 24px;
            font-weight: bold;
            color: #009c24;
        }

        header nav a {
            text-decoration: none;
            color: #333;
            margin: 0 15px;
            font-size: 16px;
        }

        header nav a:hover {
            text-decoration: underline;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 30px;
        }

        .form-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #E8F5E9;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 1px 2px 5px 1px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }

        .form-row {
            display: flex;
            gap: 80px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        .form-group input, .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #009c24;
            outline: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .form-container button {
            background-color: #E8F5E9;
            color: #008115;
            border: 1px solid #008115;
            padding: 15px 0;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            width: 40%;
        }

        .button-submit{
            display: flex;       
            justify-content: center;
            align-items: center;   
            flex-direction: column;
        }

        .form-container button:hover {
            background-color: #008115;
            color: white;
        }

        .progress-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .progress-indicator {
            width: 50px;
            height: 10px;
            border-radius: 20px;
        }

        .progress-indicator.active {
            background-color: #009c24;
        }

        .progress-indicator.inactive {
            background-color: #ffffff;
            border: 1px solid #000;
        }
        .center-content {
            text-align: center;
            margin-top: 5px; /* Optional: Adds some space at the top */
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="form-container">
            <div class="center-content">
                <h2>Enter Shipping Information</h2>
                <p>Fill out the address to get an estimated delivery date</p>
            </div>
            <form id="shippingForm" >
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First name</label>
                        <input type="text" id="first-name" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last name</label>
                        <input type="text" id="last-name" placeholder="Last name">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone-number">Phone number</label>
                        <input type="tel" id="phone-number" placeholder="+95 0-0000-0000">
                    </div>
                    <div class="form-group">
                        <label for="address">Address</label>
                        <input type="text" id="address" placeholder="MIIT, 73rd, 107 + Ngu Shwe Wah Street, Mandalay">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Select City</label>
                        <select id="city">
                            <option value="" disabled selected>Choose your city</option>
                            <option value="2000">Mandalay</option>
                            <option value="3000">Sagaing</option>
                            <option value="4500">Yangon</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="deliveryFee">Delivery Fee (MMK)</label>
                        <input type="text" id="deliveryFee" readonly placeholder="Select a city to see the fee">
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="save-address">
                    <label for="save-address">Use this as future shipping address.</label>
                </div>
                <div class="button-submit">
                    <button type="submit">Proceed to payment info ➔</button>
                </div>
                <div class="progress-container">
                    <div class="progress-indicator active"></div>
                    <div class="progress-indicator active"></div>
                    <div class="progress-indicator inactive"></div>
                </div>
            </form>
        </div>
    </div>
    <script>
        const cityDropdown = document.getElementById('city');
        const deliveryFeeInput = document.getElementById('deliveryFee');

        cityDropdown.addEventListener('change', () => {
            const selectedFee = cityDropdown.value;
            deliveryFeeInput.value = selectedFee + ' MMK';
        });
    </script>
        <script>
            document.getElementById("shippingForm").addEventListener("submit", async (e) => {
                e.preventDefault();
        
                const cartItems = JSON.parse(localStorage.getItem("checkoutCart")) || [];
                const shippingFee = document.getElementById("deliveryFee").value.replace(" MMK", "");
        
                const shippingData = {
                    customer_name: document.getElementById("first-name").value + " " + document.getElementById("last-name").value,
                    customer_address: document.getElementById("address").value,
                    customer_city: document.getElementById("city").options[document.getElementById("city").selectedIndex].text,
                    customer_phone: document.getElementById("phone-number").value,
                    shipping_fee: shippingFee,
                    cart_items: cartItems
                };
        
                try {
                    const response = await fetch("/create-order/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: JSON.stringify(shippingData)
                    });
        
                    const result = await response.json();
        
                    if (response.ok) {
                        window.location.href = `/order-success/${result.order_id}/`;
                    } else {
                        alert("Error: " + result.error);
                    }
                } catch (error) {
                    console.error("Error submitting shipping info:", error);
                }
            });
        </script>
        
    
</body>
</html>
{% endblock %}
